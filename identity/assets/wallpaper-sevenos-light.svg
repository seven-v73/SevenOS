<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <title>SevenOS Light Wallpaper</title>
  <desc>Calm light productivity wallpaper for SevenOS Light Mode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#F5F7FA"/>
      <stop offset="1" stop-color="#EEF1F5"/>
    </linearGradient>
    <radialGradient id="blue" cx="24%" cy="18%" r="52%">
      <stop offset="0" stop-color="#2F7BFF" stop-opacity="0.24"/>
      <stop offset="0.55" stop-color="#00B8D9" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="82%" cy="20%" r="42%">
      <stop offset="0" stop-color="#6A5CFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#blue)"/>
  <rect width="1920" height="1080" fill="url(#violet)"/>
  <g filter="url(#soft)" opacity="0.56">
    <ellipse cx="430" cy="795" rx="360" ry="120" fill="#2F7BFF" opacity="0.12"/>
    <ellipse cx="1450" cy="780" rx="420" ry="150" fill="#00B8D9" opacity="0.10"/>
    <ellipse cx="1090" cy="360" rx="520" ry="160" fill="#6A5CFF" opacity="0.08"/>
  </g>
  <path d="M240 710 C520 560 700 620 930 490 C1160 360 1420 360 1680 450" fill="none" stroke="#2F7BFF" stroke-opacity="0.18" stroke-width="2"/>
  <path d="M310 755 C620 620 760 690 1040 545 C1280 420 1470 460 1620 520" fill="none" stroke="#6A5CFF" stroke-opacity="0.14" stroke-width="2"/>
  <g transform="translate(905 454)" opacity="0.88">
    <text x="0" y="0" text-anchor="middle" font-family="SF Pro Rounded, SF Pro Display, system-ui" font-size="78" font-weight="500" fill="#2F7BFF">7</text>
    <text x="0" y="70" text-anchor="middle" font-family="SF Pro Display, system-ui" font-size="18" letter-spacing="9" fill="#6B7280">SEVENOS</text>
    <text x="0" y="106" text-anchor="middle" font-family="SF Pro Text, system-ui" font-size="15" fill="#9AA3AF">Clarity first.</text>
  </g>
</svg>
