<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">SevenOS African First Wallpaper</title>
  <desc id="desc">Dark geometric wallpaper with SevenOS African first color rhythm.</desc>
  <defs>
    <radialGradient id="goldGlow" cx="78%" cy="72%" r="48%">
      <stop offset="0%" stop-color="#d6a84f" stop-opacity=".18"/>
      <stop offset="44%" stop-color="#9b4a2f" stop-opacity=".10"/>
      <stop offset="100%" stop-color="#0b0b0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="indigoGlow" cx="12%" cy="18%" r="46%">
      <stop offset="0%" stop-color="#26344f" stop-opacity=".36"/>
      <stop offset="100%" stop-color="#0b0b0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15130f"/>
      <stop offset="52%" stop-color="#0b0b0a"/>
      <stop offset="100%" stop-color="#24180f"/>
