<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">SevenOS Royal Kente Immersive Wallpaper</title>
  <desc id="desc">A premium afro-futurist SevenOS wallpaper with royal midnight depth, Kente gold, Nile cyan, hibiscus and emerald dimensional light.</desc>
  <defs>
    <linearGradient id="royalNight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050611"/>
      <stop offset="28%" stop-color="#10142a"/>
      <stop offset="58%" stop-color="#1a1134"/>
      <stop offset="100%" stop-color="#070a18"/>
    </linearGradient>
    <radialGradient id="goldSun" cx="74%" cy="26%" r="42%">
      <stop offset="0%" stop-color="#fff4dd" stop-opacity=".62"/>
      <stop offset="18%" stop-color="#f5b83d" stop-opacity=".54"/>
      <stop offset="52%" stop-color="#ff6b35" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#070a18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nileGlow" cx="20%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#00b8c8" stop-opacity=".36"/>
      <stop offset="36%" stop-color="#18a058" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#070a18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hibiscusGlow" cx="88%" cy="84%" r="34%">
      <stop offset="0%" stop-color="#d7266a" stop-opacity=".34"/>
      <stop offset="46%" stop-color="#ff6b35" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#070a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kenteEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4dd" stop-opacity=".72"/>
      <stop offset="36%" stop-color="#f5b83d" stop-opacity=".96"/>
      <stop offset="68%" stop-color="#ff6b35" stop-opacity=".72"/>
      <stop offset="100%" stop-color="#00b8c8" stop-opacity=".62"/>
    </linearGradient>
    <linearGradient id="glassA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4dd" stop-opacity=".18"/>
      <stop offset="42%" stop-color="#00b8c8" stop-opacity=".13"/>
      <stop offset="100%" stop-color="#d7266a" stop-opacity=".12"/>
    </linearGradient>
    <linearGradient id="wovenGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5b83d"/>
      <stop offset="33%" stop-color="#ff6b35"/>
      <stop offset="66%" stop-color="#d7266a"/>
      <stop offset="100%" stop-color="#00b8c8"/>
    </linearGradient>
    <pattern id="kenteMicro" width="144" height="144" patternUnits="userSpaceOnUse">
      <rect width="144" height="144" fill="none"/>
      <path d="M0 36h144M0 72h144M0 108h144M36 0v144M72 0v144M108 0v144" stroke="#fff4dd" stroke-width="1" opacity=".055"/>
      <path d="M18 18h36v36H18zM90 18h36v36H90zM54 90h36v36H54z" fill="none" stroke="#f5b83d" stroke-width="2" opacity=".12"/>
      <path d="M18 126l36-36 36 36 36-36" fill="none" stroke="#00b8c8" stroke-width="2" opacity=".11"/>
      <circle cx="72" cy="72" r="5" fill="#d7266a" opacity=".16"/>
    </pattern>
    <filter id="shadow3d" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="-18" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity=".38"/>
      <feDropShadow dx="18" dy="34" stdDeviation="34" flood-color="#000000" flood-opacity=".46"/>
    </filter>
    <filter id="bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#royalNight)"/>
  <rect width="1920" height="1080" fill="url(#goldSun)"/>
  <rect width="1920" height="1080" fill="url(#nileGlow)"/>
  <rect width="1920" height="1080" fill="url(#hibiscusGlow)"/>
  <rect width="1920" height="1080" fill="url(#kenteMicro)" opacity=".78"/>

  <g opacity=".48" filter="url(#bloom)">
    <path d="M-40 850C260 640 502 695 740 805s464 180 820-20 544-228 720-146" fill="none" stroke="url(#wovenGold)" stroke-width="5" stroke-linecap="round"/>
    <path d="M-20 922C310 740 540 760 812 900s552 146 902-82" fill="none" stroke="#00b8c8" stroke-width="2" opacity=".38"/>
  </g>

  <g transform="translate(1040 110) skewX(-14)" filter="url(#shadow3d)">
    <path d="M0 0h610l-118 440H-118z" fill="url(#glassA)" stroke="url(#kenteEdge)" stroke-width="3"/>
    <path d="M54 58h482l-72 266H-18z" fill="#050611" opacity=".24" stroke="#fff4dd" stroke-opacity=".18"/>
    <path d="M96 104h300M72 158h386M48 212h320M28 266h420" stroke="#f5b83d" stroke-width="5" opacity=".28" stroke-linecap="round"/>
    <path d="M470 60l-64 264M514 60l-64 264" stroke="#00b8c8" stroke-width="3" opacity=".32"/>
  </g>

  <g transform="translate(1230 442)" filter="url(#bloom)">
    <path d="M0 0h320l-128 306h-82l96-230H0z" fill="#f5b83d"/>
    <path d="M0 0h320l-38 76H0z" fill="#ff6b35"/>
    <path d="M110 306h82l38-92h-82z" fill="#18a058"/>
    <path d="M206 76h76l-38 90h-76z" fill="#00b8c8" opacity=".88"/>
    <path d="M0 0h320l-128 306h-82l96-230H0z" fill="none" stroke="#fff4dd" stroke-opacity=".52" stroke-width="3"/>
  </g>

  <g transform="translate(132 150)" filter="url(#shadow3d)">
    <path d="M0 0h650l-100 386H-100z" fill="#10142a" opacity=".64" stroke="url(#kenteEdge)" stroke-opacity=".58" stroke-width="2"/>
    <path d="M32 42h544l-72 274H-40z" fill="#050611" opacity=".32"/>
    <path d="M74 92h104l-36 54H38zM202 92h104l-36 54H166zM330 92h104l-36 54H294zM458 92h104l-36 54H422z" fill="none" stroke="#f5b83d" stroke-opacity=".48" stroke-width="4"/>
    <path d="M48 188h438M30 240h350M12 292h480" stroke="#fff4dd" stroke-width="2" opacity=".22" stroke-linecap="round"/>
    <path d="M520 64l-78 280" stroke="#d7266a" stroke-width="5" opacity=".32"/>
  </g>

  <g opacity=".74">
    <path d="M116 828h390" stroke="url(#wovenGold)" stroke-width="8" stroke-linecap="round"/>
    <path d="M116 850h230" stroke="#00b8c8" stroke-width="4" stroke-linecap="round"/>
    <text x="116" y="928" fill="#fff4dd" font-family="JetBrains Mono, monospace" font-size="72" font-weight="800">SevenOS</text>
    <text x="120" y="980" fill="#f5b83d" font-family="JetBrains Mono, monospace" font-size="26" font-weight="700">Royal Linux ecosystem. Built to create, defend, deploy.</text>
  </g>

  <rect x="14" y="14" width="1892" height="1052" rx="28" fill="none" stroke="url(#kenteEdge)" stroke-opacity=".20" stroke-width="3"/>
</svg>
