<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">SevenOS Seven Prism Symbol</title>
  <desc id="desc">Premium SevenOS prism symbol: one system splitting into focused mini OS worlds.</desc>
  <defs>
    <linearGradient id="bg" x1="28" y1="20" x2="232" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#09090B"/>
      <stop offset="1" stop-color="#05070A"/>
    </linearGradient>
    <linearGradient id="edge" x1="54" y1="42" x2="206" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4DA3FF"/>
      <stop offset="0.48" stop-color="#7A5CFF"/>
      <stop offset="1" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="facet-a" x1="82" y1="58" x2="128" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EDEDED" stop-opacity=".88"/>
      <stop offset=".45" stop-color="#4DA3FF" stop-opacity=".34"/>
      <stop offset="1" stop-color="#4DA3FF" stop-opacity=".16"/>
    </linearGradient>
    <linearGradient id="facet-b" x1="128" y1="54" x2="174" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7A5CFF" stop-opacity=".50"/>
