# SevenOS Calamares post-install module scaffold
#
# Intended behavior once Calamares is packaged into the live ISO:
# - copy /opt/SevenOS into the target system
# - run SevenOS base setup inside chroot
# - install CLI, hub, theme and post-install checks
#
# This is a configuration marker for the SevenOS architecture gate. The real
# Calamares module script should stay conservative and explicit.

script:
  - command: "/opt/SevenOS/bin/seven-calamares-finalize"
    timeout: 2400
