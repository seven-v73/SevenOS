# SevenOS Calamares post-install hook
#
# Calamares ships a standard shellprocess module. SevenOS uses that module
# instead of a custom, distro-local module name so the graphical installer can
# run on a fresh ISO without requiring extra Python plugin packaging.
---
dontChroot: false
timeout: 2400
verbose: true

script:
  - command: "/opt/SevenOS/bin/seven-calamares-finalize"
    timeout: 2400

i18n:
  name: "Finalize SevenOS"
  name[fr]: "Finaliser SevenOS"
