font_family SF Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 10.0

background #F8FAFD
foreground #1C1F26
selection_background #DDEBFF
selection_foreground #1C1F26
cursor #2F7BFF
cursor_text_color #FFFFFF

background_opacity 0.92
background_blur 10
dynamic_background_opacity yes
window_padding_width 6
remember_window_size no
initial_window_width 76c
initial_window_height 21c
wayland_titlebar_color #FFFFFF

active_border_color #2F7BFF
inactive_border_color #DDE3EA
active_tab_background #FFFFFF
active_tab_foreground #1C1F26
inactive_tab_background #EEF1F5
inactive_tab_foreground #6B7280
tab_bar_background #F5F7FA
tab_bar_min_tabs 1
tab_title_template "  🔴  🟡  🟢   {title}  "

color0 #F5F7FA
color1 #D23652
color2 #00A77A
color3 #B47600
color4 #2F7BFF
color5 #6A5CFF
color6 #00B8D9
color7 #384152
color8 #9AA3AF
color9 #D23652
color10 #00A77A
color11 #B47600
color12 #2F7BFF
color13 #6A5CFF
color14 #00B8D9
color15 #1C1F26

copy_on_select clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+w close_window
map ctrl+shift+f launch --type=background hyprctl dispatch fullscreen 1
map ctrl+shift+u kitten hints

env SEVENOS_TERMINAL_LIGHT=1
