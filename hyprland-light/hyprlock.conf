general {
    disable_loading_bar = true
    hide_cursor = false
}

background {
    monitor =
    path = ~/.local/share/sevenos/wallpapers/wallpaper-sevenos-active.png
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 1.02
    brightness = 0.88
    vibrancy = 0.06
}

input-field {
    monitor =
    size = 300, 48
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.22
    dots_center = true
    outer_color = rgba(54, 76, 112, 0.13)
    inner_color = rgba(250, 252, 255, 0.76)
    font_color = rgba(32, 40, 58, 0.94)
    fade_on_empty = false
    placeholder_text = <span foreground="##20283A99">$USER</span>
    check_color = rgba(77, 127, 230, 0.72)
    fail_color = rgba(210, 15, 57, 0.72)
    rounding = 24
    position = 0, -90
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(32, 40, 58, 0.96)
    font_size = 48
    font_family = SF Pro Display
    position = 0, 72
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(67, 76, 94, 0.78)
    font_size = 16
    font_family = SF Pro Rounded
    position = 0, 34
    halign = center
    valign = center
}
