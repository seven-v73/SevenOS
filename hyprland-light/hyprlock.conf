general {
    disable_loading_bar = true
    hide_cursor = false
}

background {
    monitor =
    path = ~/.local/share/sevenos/wallpapers/wallpaper-sevenos-active.png
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 1.02
    brightness = 0.96
    vibrancy = 0.08
}

input-field {
    monitor =
    size = 300, 48
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.22
    dots_center = true
    outer_color = rgba(28, 31, 38, 0.10)
    inner_color = rgba(255, 255, 255, 0.74)
    font_color = rgba(28, 31, 38, 0.94)
    fade_on_empty = false
    placeholder_text = <span foreground="##1c1f2699">$USER</span>
    check_color = rgba(47, 123, 255, 0.72)
    fail_color = rgba(210, 15, 57, 0.72)
    rounding = 24
    position = 0, -90
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(28, 31, 38, 0.96)
    font_size = 48
    font_family = SF Pro Display
    position = 0, 72
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(56, 65, 82, 0.78)
    font_size = 16
    font_family = SF Pro Rounded
    position = 0, 34
    halign = center
    valign = center
}
