title    SevenOS Live (%ARCH%, UEFI) with speech
sort-key 02
linux    /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
initrd   /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
options  archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on loglevel=4 rd.udev.log_level=4 systemd.show_status=true vt.global_cursor_default=1 nvidia_drm.modeset=1 ibt=off
