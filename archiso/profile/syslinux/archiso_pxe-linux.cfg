LABEL sevenos_nbd
TEXT HELP
Boot the SevenOS live medium using NBD.
It opens the SevenOS graphical live session from a network boot source.
ENDTEXT
MENU LABEL SevenOS Live (%ARCH%, NBD)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archiso_nbd_srv=${pxeserver} cms_verify=y quiet splash loglevel=3 rd.udev.log_level=3 systemd.show_status=false vt.global_cursor_default=0 nvidia_drm.modeset=1 ibt=off
SYSAPPEND 3

