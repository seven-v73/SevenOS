LABEL sevenos
TEXT HELP
Boot the SevenOS live medium on BIOS.
It allows you to try or install SevenOS and run system maintenance.
ENDTEXT
MENU LABEL SevenOS Live (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet splash loglevel=3 rd.udev.log_level=3 systemd.show_status=false vt.global_cursor_default=0 nvidia_drm.modeset=1 ibt=off

# Safe graphics boot option
LABEL sevenossafe
TEXT HELP
Boot SevenOS Live with visible startup messages and tolerant graphics options.
Use this if the normal SevenOS Live entry shows a black screen.
ENDTEXT
MENU LABEL SevenOS Live (%ARCH%, BIOS) Safe ^Graphics
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% nvidia_drm.modeset=1 nouveau.modeset=1 i915.modeset=1 amdgpu.dc=1 ibt=off loglevel=4 systemd.show_status=true vt.global_cursor_default=1

# Accessibility boot option
LABEL sevenosspeech
TEXT HELP
Boot the SevenOS live medium on BIOS with speakup screen reader.
It allows you to try or install SevenOS and run maintenance with speech feedback.
ENDTEXT
MENU LABEL SevenOS Live (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on loglevel=4 rd.udev.log_level=4 systemd.show_status=true vt.global_cursor_default=1 nvidia_drm.modeset=1 ibt=off
