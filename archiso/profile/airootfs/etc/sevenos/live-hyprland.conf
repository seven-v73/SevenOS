# SevenOS Live Hyprland fallback profile.
# This minimal config is used only by the ISO live session. It avoids depending
# on generated user config before the installer has appeared.

monitor=,preferred,auto,1

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,SevenOS
env = SEVENOS_ROOT,/opt/SevenOS
env = SEVENOS_LIVE_SESSION,1
env = PATH,/usr/local/bin:/opt/SevenOS/bin:/usr/bin:/bin
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb

$mod = SUPER

exec-once = /usr/local/bin/sevenos-live-ready
exec-once = /usr/local/bin/sevenos-live-guard

bind = $mod, Return, exec, seven-terminal
bind = $mod, I, exec, seven-installer gui
bind = $mod, R, exec, seven-installer live-retry
bind = $mod, Q, killactive
bind = $mod SHIFT, Q, exit

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(5ab8ffcc) rgba(8b7cffcc) 45deg
    col.inactive_border = rgba(7c8aa340)
    layout = dwindle
}

decoration {
    rounding = 18
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

input {
    kb_layout = us,fr
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

windowrule = float, class:^(SevenOSInstallerNative|Calamares|calamares|SevenOSLiveRescue)$
windowrule = center, class:^(SevenOSInstallerNative|Calamares|calamares|SevenOSLiveRescue)$
windowrule = size 980 660, class:^(SevenOSInstallerNative|Calamares|calamares)$
windowrule = float, title:^(SevenOS Installer|Install SevenOS|Installer SevenOS)(.*)$
windowrule = center, title:^(SevenOS Installer|Install SevenOS|Installer SevenOS)(.*)$
windowrule = size 980 660, title:^(SevenOS Installer|Install SevenOS|Installer SevenOS)(.*)$
