# SevenOS Hyprland config
# Identity: Royal Kente, Nile cyan, hibiscus energy, emerald trust.

monitor=,preferred,auto,1

$terminal = kitty
$launcher = rofi -show drun -show-icons -theme ~/.config/rofi/sevenos.rasi
$mod = SUPER

exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = swayidle -w timeout 600 'swaylock -f -c 050611' timeout 900 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on'
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = seven-welcome --notify

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

general {
    gaps_in = 5
    gaps_out = 11
    border_size = 2
    col.active_border = rgba(fff4ddff) rgba(f5b83dff) rgba(ff6b35ff) rgba(d7266aff) rgba(00b8c8ff) 45deg
    col.inactive_border = rgba(1a1134cc)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 7
        passes = 3
        vibrancy = 0.24
    }
    shadow {
        enabled = true
        range = 26
        render_power = 4
        color = rgba(05061199)
    }
}

animations {
    enabled = true
    bezier = seven, 0.16, 1, 0.3, 1
    bezier = sevenMove, 0.22, 1, 0.36, 1
    animation = windows, 1, 5, seven, popin 87%
    animation = windowsOut, 1, 4, seven, popin 78%
    animation = border, 1, 5, seven
    animation = fade, 1, 5, seven
    animation = workspaces, 1, 5, sevenMove, slidefade 18%
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

dwindle {
    preserve_split = true
}

bind = $mod, Return, exec, $terminal
bind = $mod, SPACE, exec, seven-hub
bind = $mod, A, exec, $launcher
bind = $mod, D, exec, $launcher
bind = $mod, H, exec, seven-hub
bind = $mod, R, exec, rofi -show run -theme ~/.config/rofi/sevenos.rasi
bind = $mod, slash, exec, seven-help
bind = $mod SHIFT, P, exec, seven-power
bind = $mod SHIFT, L, exec, seven-power lock
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod, P, pseudo

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
