# SevenOS Hyprland config
# Identity: SevenOS Design System v2, Beyond the Desktop.

monitor=,preferred,auto,1
source = ~/.config/hypr/conf/monitor.conf

$terminal = seven-terminal classic
$spotlight = seven-spotlight
$launcher = seven-overview apps
$overview = seven-overview windows
$quicksettings = seven-quick-settings
$settings = seven-settings
$dock = seven-dock toggle
$mod = SUPER

exec-once = seven-session

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = TERMINAL,seven-terminal
env = SEVENOS_TERMINAL,seven-terminal
env = GTK_THEME,adw-gtk3
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(4da3ffcc) rgba(7a5cffb0) rgba(00d4ffaa) 45deg
    col.inactive_border = rgba(8a8f9838)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 26
    blur {
        enabled = true
        size = 14
        passes = 3
        vibrancy = 0.20
        noise = 0.018
        contrast = 0.98
    }
    shadow {
        enabled = false
        range = 10
        render_power = 2
        color = rgba(00000000)
    }
    dim_inactive = true
    dim_strength = 0.06
}

input {
    kb_layout = us,fr
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}
source = ~/.config/hypr/conf/keyboard.conf

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# SevenOS dynamic behavior is generated by hyprland/lua and sourced below.
# Keep this file focused on stable compositor foundations and fallback includes.

source = ~/.config/hypr/conf/sevenos-windows.conf
source = ~/.config/hypr/conf/sevenos-lua-generated.conf
source = ~/.config/hypr/conf/sevenos-dynamic.conf
source = ~/.config/hypr/conf/custom.conf
