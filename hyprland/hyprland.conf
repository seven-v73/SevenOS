# SevenOS Hyprland config
# Identity: SevenOS Design System v1, sovereign liquid glass.

monitor=,preferred,auto,1
source = ~/.config/hypr/conf/monitor.conf

$terminal = seven-terminal classic
$spotlight = seven-spotlight
$launcher = seven-overview apps
$overview = seven-overview windows
$quicksettings = seven-quick-settings
$mod = SUPER

exec-once = seven-session

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GTK_THEME,adw-gtk3
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(ffffffd9) rgba(6f9dbcaa) rgba(4ba97988) 45deg
    col.inactive_border = rgba(dbe9efcc)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 16
    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.12
        noise = 0.02
        contrast = 0.92
    }
    shadow {
        enabled = false
        range = 10
        render_power = 2
        color = rgba(00000000)
    }
    dim_inactive = true
    dim_strength = 0.04
}

animations {
    enabled = true
    bezier = seven, 0.05, 0.70, 0.10, 1.00
    bezier = sevenMove, 0.38, 1.21, 0.22, 1.00
    bezier = sevenExit, 0.30, 0.00, 0.80, 0.15
    bezier = sevenMenu, 0.10, 1.00, 0.00, 1.00
    animation = windows, 1, 4, seven, popin 82%
    animation = windowsOut, 1, 3, sevenExit, popin 92%
    animation = border, 1, 6, seven
    animation = fade, 1, 4, seven
    animation = layers, 1, 4, sevenMenu, popin 94%
    animation = workspaces, 1, 6, sevenMenu, slidefade 18%
    animation = specialWorkspace, 1, 4, sevenMove, slidevert
}

input {
    kb_layout = us,fr
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}
source = ~/.config/hypr/conf/keyboard.conf

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

bind = $mod, Return, exec, $terminal
bind = $mod SHIFT, Return, exec, seven-terminal dark
bind = $mod CTRL, Return, exec, seven-terminal menu
bindr = $mod, SUPER_L, exec, $launcher
bindr = $mod, SUPER_R, exec, $launcher
bind = $mod, SPACE, exec, $spotlight
bind = $mod, A, exec, $launcher
bind = $mod, C, exec, seven shield mode
bind = $mod, TAB, exec, $overview
bind = $mod, N, exec, $quicksettings
bind = $mod, O, exec, $quicksettings
bind = $mod, W, exec, $spotlight
bind = $mod, E, exec, seven-files
bind = $mod SHIFT, E, exec, seven-files menu
bind = $mod CTRL, E, exec, seven-files profile
bind = $mod, H, exec, seven-hub
bind = $mod, R, exec, $spotlight
bind = $mod, slash, exec, seven-help
bind = $mod SHIFT, P, exec, seven-power
bind = $mod, L, exec, seven-power lock
bind = $mod SHIFT, L, exec, systemctl suspend || loginctl suspend
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, F, fullscreen
bind = $mod ALT, SPACE, togglefloating
bind = $mod, V, exec, seven-overview windows
bind = $mod, P, pseudo
bind = $mod, S, togglespecialworkspace, seven
bind = $mod ALT, S, movetoworkspace, special:seven

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod CTRL, right, workspace, r+1
bind = $mod CTRL, left, workspace, r-1
bind = $mod, Page_Down, workspace, r+1
bind = $mod, Page_Up, workspace, r-1
bind = $mod SHIFT, Page_Down, movetoworkspace, r+1
bind = $mod SHIFT, Page_Up, movetoworkspace, r-1

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = , Print, exec, seven-screenshot area save
bind = $mod, Print, exec, seven-screenshot full save
bind = $mod SHIFT, S, exec, seven-screenshot area edit
bind = $mod CTRL, S, exec, seven-screenshot area copy
bind = $mod SHIFT, C, exec, hyprpicker -a || true
bind = $mod CTRL, C, exec, seven shield hud
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+ -l 1.5
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

windowrule = match:title ^(Open File)(.*)$, float on, center on
windowrule = match:title ^(Select a File)(.*)$, float on, center on
windowrule = match:title ^(Open Folder)(.*)$, float on, center on
windowrule = match:title ^(Save As)(.*)$, float on, center on
windowrule = match:title ^(File Upload)(.*)$, float on, center on
windowrule = match:class ^(pavucontrol)$, float on, center on, size 46% 46%
windowrule = match:class ^(nm-connection-editor)$, float on, center on, size 50% 58%
windowrule = match:class ^(org.gnome.Nautilus)$, float on, center on, size 78% 76%
windowrule = match:class ^(Nautilus)$, float on, center on, size 78% 76%
windowrule = match:class ^(SevenTerminalNative)$, float on, center on, size 640 420
windowrule = match:class ^(SevenTerminalClassic)$, float on, center on, size 640 420
windowrule = match:class ^(SevenTerminalDark)$, float on, center on, size 640 420
windowrule = match:class ^(SevenLaunchpadNative)$, float off, fullscreen on
windowrule = match:class ^(SevenFilesNative)$, float on, center on, size 1120 700
windowrule = match:title ^(SevenOS Help)(.*)$, float on, center on
windowrule = match:title ^(SevenOS Migration)(.*)$, float on, center on
windowrule = match:title ^(Picture[- ]?[Ii]n[- ]?[Pp]icture)(.*)$, float on, pin on, size 25% 25%, move 73% 72%

workspace = special:seven, gapsout:30

source = ~/.config/hypr/conf/custom.conf
