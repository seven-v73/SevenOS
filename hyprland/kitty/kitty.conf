# SevenOS Kitty
# SevenOS terminal surface: frosted glass canvas, graphite text, indigo flow.

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.5
symbol_map U+1F1E6-U+1F1FF Noto Color Emoji
disable_ligatures never

cursor_shape beam
cursor_blink_interval 0.55
cursor_stop_blinking_after 12.0

scrollback_lines 12000
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 3.0
mouse_hide_wait 2.0
copy_on_select no
strip_trailing_spaces smart
enable_audio_bell no
visual_bell_duration 0.08

window_padding_width 10
single_window_margin_width 0
remember_window_size yes
initial_window_width 112c
initial_window_height 34c
confirm_os_window_close 0
resize_debounce_time 0.08

background_opacity 0.88
dynamic_background_opacity yes
background_blur 18
dim_opacity 0.72

tab_bar_edge top
tab_bar_margin_width 8.0
tab_bar_margin_height 6.0 0.0
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template " {index}: {title} "
active_tab_title_template " {index}: {title} "
active_tab_font_style bold
inactive_tab_font_style normal

wayland_titlebar_color background
linux_display_server wayland

foreground #17232b
background #eef4f8
selection_foreground #17232b
selection_background #d8e8ef

cursor #567f9d
cursor_text_color #eef4f8
url_color #567f9d

active_border_color #6f9dbc
inactive_border_color #dbe9ef
bell_border_color #a95738

active_tab_foreground #17232b
active_tab_background #e8f3f8
inactive_tab_foreground #4d606a
inactive_tab_background #f7fcff
tab_bar_background #eef4f8

mark1_foreground #17232b
mark1_background #d8e8ef
mark2_foreground #17232b
mark2_background #b8d2df
mark3_foreground #17232b
mark3_background #e5d6bd

# ANSI palette
color0  #eef4f8
color1  #a95738
color2  #3f8b65
color3  #b89a62
color4  #567f9d
color5  #8f7a53
color6  #6f9dbc
color7  #17232b
color8  #dbe9ef
color9  #a95738
color10 #4ba979
color11 #cbb37a
color12 #6f9dbc
color13 #b89a62
color14 #4ba979
color15 #17232b

# Ergonomic defaults
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+h previous_tab
map ctrl+shift+l next_tab
map ctrl+shift+f launch --type=overlay --stdin-source=@screen_scrollback fzf
map ctrl+shift+backspace clear_terminal reset active

detect_urls yes
open_url_with default
url_style curly

shell_integration enabled
