# SevenOS Kitty
# Sovereign Graphite terminal surface: calm graphite, brass command, cobalt flow.

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.5
symbol_map U+1F1E6-U+1F1FF Noto Color Emoji
disable_ligatures never

cursor_shape beam
cursor_blink_interval 0.55
cursor_stop_blinking_after 12.0

scrollback_lines 12000
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 3.0
mouse_hide_wait 2.0
copy_on_select no
strip_trailing_spaces smart
enable_audio_bell no
visual_bell_duration 0.08

window_padding_width 10
single_window_margin_width 0
remember_window_size yes
initial_window_width 112c
initial_window_height 34c
confirm_os_window_close 0
resize_debounce_time 0.08

background_opacity 0.88
dynamic_background_opacity yes
background_blur 18
dim_opacity 0.72

tab_bar_edge top
tab_bar_margin_width 8.0
tab_bar_margin_height 6.0 0.0
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template " {index}: {title} "
active_tab_title_template " {index}: {title} "
active_tab_font_style bold
inactive_tab_font_style normal

wayland_titlebar_color background
linux_display_server wayland

foreground #ede3d1
background #07090b
selection_foreground #07090b
selection_background #d7b46a

cursor #d7b46a
cursor_text_color #07090b
url_color #2f5d8c

active_border_color #d7b46a
inactive_border_color #17212b
bell_border_color #c47a3c

active_tab_foreground #07090b
active_tab_background #d7b46a
inactive_tab_foreground #bca77d
inactive_tab_background #10161d
tab_bar_background #07090b

mark1_foreground #07090b
mark1_background #d7b46a
mark2_foreground #07090b
mark2_background #2f5d8c
mark3_foreground #ede3d1
mark3_background #7a2e3a

# ANSI palette
color0  #07090b
color1  #7a2e3a
color2  #2e8b6d
color3  #d7b46a
color4  #2f5d8c
color5  #8a6a9f
color6  #5d9c94
color7  #ede3d1
color8  #17212b
color9  #c47a3c
color10 #51a987
color11 #e0c27d
color12 #5f83ad
color13 #a582b7
color14 #7db9b0
color15 #fff8ea

# Ergonomic defaults
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+h previous_tab
map ctrl+shift+l next_tab
map ctrl+shift+f launch --type=overlay --stdin-source=@screen_scrollback fzf
map ctrl+shift+backspace clear_terminal reset active

detect_urls yes
open_url_with default
url_style curly

shell_integration enabled
