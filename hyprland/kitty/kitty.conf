# SevenOS Kitty
# SevenOS v1 terminal surface: ebene base, ancestral gold command, indigo flow.

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.5
symbol_map U+1F1E6-U+1F1FF Noto Color Emoji
disable_ligatures never

cursor_shape beam
cursor_blink_interval 0.55
cursor_stop_blinking_after 12.0

scrollback_lines 12000
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 3.0
mouse_hide_wait 2.0
copy_on_select no
strip_trailing_spaces smart
enable_audio_bell no
visual_bell_duration 0.08

window_padding_width 10
single_window_margin_width 0
remember_window_size yes
initial_window_width 112c
initial_window_height 34c
confirm_os_window_close 0
resize_debounce_time 0.08

background_opacity 0.88
dynamic_background_opacity yes
background_blur 18
dim_opacity 0.72

tab_bar_edge top
tab_bar_margin_width 8.0
tab_bar_margin_height 6.0 0.0
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template " {index}: {title} "
active_tab_title_template " {index}: {title} "
active_tab_font_style bold
inactive_tab_font_style normal

wayland_titlebar_color background
linux_display_server wayland

foreground #1f160b
background #f7f1e5
selection_foreground #1f160b
selection_background #c8a96e

cursor #c8a96e
cursor_text_color #1f160b
url_color #7ba3cf

active_border_color #c8a96e
inactive_border_color #f2e7d3
bell_border_color #c4673a

active_tab_foreground #1f160b
active_tab_background #c8a96e
inactive_tab_foreground #4f4638
inactive_tab_background #ffffff
tab_bar_background #f7f1e5

mark1_foreground #1f160b
mark1_background #c8a96e
mark2_foreground #1f160b
mark2_background #5b7fa6
mark3_foreground #1f160b
mark3_background #c4673a

# ANSI palette
color0  #f7f1e5
color1  #c4673a
color2  #4a8c5c
color3  #c8a96e
color4  #5b7fa6
color5  #8a7048
color6  #7ba3cf
color7  #1f160b
color8  #e6d4b8
color9  #c4673a
color10 #5aad72
color11 #e2c07a
color12 #7ba3cf
color13 #c8a96e
color14 #5aad72
color15 #1f160b

# Ergonomic defaults
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+h previous_tab
map ctrl+shift+l next_tab
map ctrl+shift+f launch --type=overlay --stdin-source=@screen_scrollback fzf
map ctrl+shift+backspace clear_terminal reset active

detect_urls yes
open_url_with default
url_style curly

shell_integration enabled
