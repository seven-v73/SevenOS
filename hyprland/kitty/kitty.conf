# SevenOS Kitty
# Royal Kente terminal surface: midnight glass, gold command, Nile flow.

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.5
symbol_map U+1F1E6-U+1F1FF Noto Color Emoji
disable_ligatures never

cursor_shape beam
cursor_blink_interval 0.55
cursor_stop_blinking_after 12.0

scrollback_lines 12000
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 3.0
mouse_hide_wait 2.0
copy_on_select no
strip_trailing_spaces smart
enable_audio_bell no
visual_bell_duration 0.08

window_padding_width 10
single_window_margin_width 0
remember_window_size yes
initial_window_width 112c
initial_window_height 34c
confirm_os_window_close 0
resize_debounce_time 0.08

background_opacity 0.88
dynamic_background_opacity yes
background_blur 18
dim_opacity 0.72

tab_bar_edge top
tab_bar_margin_width 8.0
tab_bar_margin_height 6.0 0.0
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template " {index}: {title} "
active_tab_title_template " {index}: {title} "
active_tab_font_style bold
inactive_tab_font_style normal

wayland_titlebar_color background
linux_display_server wayland

foreground #fff4dd
background #050611
selection_foreground #050611
selection_background #f5b83d

cursor #00b8c8
cursor_text_color #050611
url_color #00b8c8

active_border_color #f5b83d
inactive_border_color #1a1134
bell_border_color #ff6b35

active_tab_foreground #050611
active_tab_background #f5b83d
inactive_tab_foreground #d8bf8a
inactive_tab_background #10142a
tab_bar_background #050611

mark1_foreground #050611
mark1_background #f5b83d
mark2_foreground #050611
mark2_background #00b8c8
mark3_foreground #fff4dd
mark3_background #d7266a

# ANSI palette
color0  #050611
color1  #d7266a
color2  #18a058
color3  #f5b83d
color4  #00b8c8
color5  #8a4cff
color6  #35d4c7
color7  #fff4dd
color8  #10142a
color9  #ff6b35
color10 #44d27f
color11 #ffd36a
color12 #63e5ff
color13 #ff73aa
color14 #8df5e7
color15 #ffffff

# Ergonomic defaults
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+h previous_tab
map ctrl+shift+l next_tab
map ctrl+shift+f launch --type=overlay --stdin-source=@screen_scrollback fzf
map ctrl+shift+backspace clear_terminal reset active

detect_urls yes
open_url_with default
url_style curly

shell_integration enabled
