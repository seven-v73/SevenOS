# SevenOS Kitty Classic
# SevenOS translucent terminal profile: deep void, quiet header, minimal prompt.

font_family SF Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.0
symbol_map U+1F1E6-U+1F1FF,U+1F534,U+1F7E1,U+1F7E2 Noto Color Emoji
disable_ligatures never
adjust_line_height 110%
adjust_column_width 101%
env SEVENOS_TERMINAL_BACKEND=kitty
shell /opt/SevenOS/bin/seven-terminal-shell

cursor_shape beam
cursor_blink_interval 0.55
cursor_stop_blinking_after 12.0

scrollback_lines 20000
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 3.0
mouse_hide_wait 2.0
copy_on_select clipboard
strip_trailing_spaces smart
enable_audio_bell no
visual_bell_duration 0.08

window_padding_width 12
single_window_margin_width 0
remember_window_size no
initial_window_width 88c
initial_window_height 24c
confirm_os_window_close 0
resize_debounce_time 0.08
enabled_layouts splits,stack,tall
window_logo_path /opt/SevenOS/branding/sddm/sevenos/assets/seven-prism.png
window_logo_position bottom-right
window_logo_alpha 0.08

background_opacity 0.90
dynamic_background_opacity yes
background_blur 14
dim_opacity 0.82

tab_bar_edge top
tab_bar_min_tabs 1
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style separator
tab_separator "  "
tab_bar_align left
tab_title_template "  SevenOS  "
active_tab_title_template "  SevenOS  "
active_tab_font_style normal
inactive_tab_font_style normal
tab_powerline_style slanted

wayland_titlebar_color #12131A
linux_display_server wayland
env SEVENOS_TERMINAL_COUNTRY=0
env SEVENOS_TERMINAL_CLASSIC=1
env SEVENOS_TERMINAL_PROMPT=1

foreground #F4F7FA
background #09090B
selection_foreground #09090B
selection_background #7CCBFF

cursor #00D4FF
cursor_text_color #09090B
url_color #4DA3FF

active_border_color #4DA3FF
inactive_border_color #252938
bell_border_color #FF5976

active_tab_foreground #EDEDED
active_tab_background #12131A
inactive_tab_foreground #8A8F98
inactive_tab_background #12131A
tab_bar_background #12131A

mark1_foreground #09090B
mark1_background #00D4FF
mark2_foreground #09090B
mark2_background #4DA3FF
mark3_foreground #09090B
mark3_background #7A5CFF

color0  #09090B
color1  #FF5976
color2  #00FFB3
color3  #F6C85F
color4  #4DA3FF
color5  #7A5CFF
color6  #00D4FF
color7  #EDEDED
color8  #606776
color9  #FF7A93
color10 #00E676
color11 #FFD580
color12 #79BBFF
color13 #9A84FF
color14 #5BE6FF
color15 #FFFFFF

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+r load_config_file
map ctrl+shift+h previous_tab
map ctrl+shift+l next_tab
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9
map ctrl+shift+s launch --type=overlay --stdin-source=@screen_scrollback fzf
map ctrl+shift+space launch --type=overlay --cwd=current seven-terminal-palette
map ctrl+shift+o launch --type=overlay --cwd=current
map ctrl+shift+u kitten hints
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+y copy_to_clipboard
map ctrl+shift+p paste_from_clipboard
map ctrl+shift+backspace clear_terminal reset active
map ctrl+shift+w close_window
map ctrl+shift+m launch --type=background hyprctl dispatch movetoworkspace special:seven
map ctrl+shift+f launch --type=background hyprctl dispatch fullscreen 1

detect_urls yes
open_url_with default
url_style curly
shell_integration disabled
