# SevenOS dynamic compositor accents.
# This file is updated by scripts/wallpaper-theme.sh when the wallpaper changes.

general {
    col.active_border = rgba(4da3ffcc) rgba(7a5cffb0) rgba(00d4ffaa) 45deg
    col.inactive_border = rgba(8a8f9838)
}

decoration {
    blur {
        vibrancy = 0.18
        contrast = 0.96
    }
}
