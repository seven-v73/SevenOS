bind = $mod, 3, exec, seven-workspace switch 3
bind = $mod, 4, exec, seven-workspace switch 4
bind = $mod, 5, exec, seven-workspace switch 5
bind = $mod, 6, exec, seven-workspace switch 6
bind = $mod, 7, exec, seven-workspace switch 7
bind = $mod, 8, exec, seven-workspace switch 8
bind = $mod, 9, exec, seven-workspace switch 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod CTRL, right, exec, seven-workspace next
bind = $mod CTRL, left, exec, seven-workspace prev
bind = $mod, Page_Down, exec, seven-workspace next
bind = $mod, Page_Up, exec, seven-workspace prev
bind = $mod SHIFT, Page_Down, movetoworkspace, r+1
bind = $mod SHIFT, Page_Up, movetoworkspace, r-1
bind = , Print, exec, seven-screenshot area save
