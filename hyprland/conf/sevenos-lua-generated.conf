# SevenOS Lua generated Hyprland layer
# Generated at 2026-05-20T22:53:55Z
# Profile: equinox - Equinox Balance
# Safe generated layer: static Hyprland config remains the fallback.

# Profile intent
# role = balanced general mini OS
# workspace_policy = neutral
# ui_density = balanced

# Profile runtime signals
# context = general
# layout = balanced
# priority = normal

# Workspace intent
# 1: daily work
# 2: reading and files
# 3: communication
# 4: media
# 5: optional focused workload

# Profile actions exposed to future event engine
# keep essential controls visible
# route SevenOS native panels as centered floating surfaces
# avoid profile-specific dominance

# Phase 3 emits common rules plus profile-aware rules.
# Static Hyprland remains the fallback while Lua reaches parity.

# Profile environment
env = SEVENOS_HYPR_PROFILE,equinox
env = SEVENOS_HYPR_LAYOUT,balanced

# Common animation rules
animations {
    enabled = true
    bezier = seven, 0.16, 1.00, 0.30, 1.00
    bezier = sevenOpen, 0.18, 1.00, 0.22, 1.00
    bezier = sevenMove, 0.20, 1.00, 0.32, 1.00
    bezier = sevenWorkspace, 0.16, 1.00, 0.24, 1.00
    bezier = sevenExit, 0.30, 0.00, 0.80, 0.15
    bezier = sevenMenu, 0.10, 1.00, 0.00, 1.00
    animation = windows, 1, 5, sevenOpen, popin 88%
    animation = windowsOut, 1, 4, sevenExit, popin 94%
    animation = border, 1, 8, seven
    animation = fade, 1, 5, seven
    animation = layers, 1, 5, sevenMenu, popin 96%
    animation = workspaces, 1, 7, sevenWorkspace, slidefade 24%
    animation = specialWorkspace, 1, 5, sevenMove, slidevert
}

# Profile animation rules
# Equinox keeps the cinematic balanced SevenOS motion preset.

# Common keybinds
bind = $mod, Return, exec, $terminal
bind = $mod SHIFT, Return, exec, seven-terminal dark
bind = $mod CTRL, Return, exec, seven-terminal menu
bindr = $mod, SUPER_L, exec, $launcher
bindr = $mod, SUPER_R, exec, $launcher
bind = $mod, SPACE, exec, $spotlight
bind = $mod, A, exec, $launcher
bind = $mod, C, exec, seven shield mode
bind = $mod, TAB, exec, $overview
bind = $mod, N, exec, $quicksettings
bind = $mod, O, exec, $quicksettings
bind = $mod, comma, exec, $settings
bind = $mod, I, exec, seven-settings general
bind = $mod, D, exec, $dock
bind = $mod, W, exec, $spotlight
bind = $mod, E, exec, seven-files
bind = $mod SHIFT, E, exec, seven-files menu
bind = $mod CTRL, E, exec, seven-files profile
bind = $mod, H, exec, seven-help
bind = $mod SHIFT, H, exec, seven-hub
bind = $mod, R, exec, $spotlight
bind = $mod SHIFT, P, exec, seven-power
bind = $mod, L, exec, seven-power lock
bind = $mod SHIFT, L, exec, systemctl suspend || loginctl suspend
bind = $mod SHIFT, R, exec, sh -lc 'PATH="$HOME/.local/bin:/usr/local/bin:/usr/bin:$PATH"; seven-recorder area'
bind = $mod CTRL SHIFT, R, exec, sh -lc 'PATH="$HOME/.local/bin:/usr/local/bin:/usr/bin:$PATH"; seven-recorder full'
bind = $mod ALT, R, exec, hyprctl reload
bind = $mod, Q, killactive
bind = $mod, M, exit
