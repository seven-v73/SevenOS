# SevenOS generated theme environment fallback.
# scripts/apply-theme.sh rewrites ~/.config/hypr/conf/sevenos-theme-env.conf
# with the active light/dark GTK, Qt, icon and portal hints.
env = SEVENOS_THEME_MODE,dark
env = GTK_THEME,adw-gtk3
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
