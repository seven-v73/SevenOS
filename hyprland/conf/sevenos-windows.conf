# Seven Smart Window System
# User-facing behavior lives in `seven-window`.
# This file keeps Hyprland app placement aligned with the SevenOS window model.

# SevenEffects: consistent glass/depth treatment for system surfaces.
# Hyprland 0.55+ layer rules use explicit values and match selectors.
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace swaync-notification-window

# Window placement is generated by hyprland/lua/rules/windows.lua.
# Compatibility coverage kept in Lua includes blueman-manager, mpv, vlc,
# Spotify, SevenOS native panels, terminal surfaces and file dialogs.
