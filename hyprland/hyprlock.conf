general {
    disable_loading_bar = true
    hide_cursor = false
}

background {
    monitor =
    path = ~/.local/share/sevenos/wallpapers/wallpaper-sevenos-active.png
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.92
    brightness = 0.72
    vibrancy = 0.18
}

input-field {
    monitor =
    size = 300, 48
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.22
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.14)
    inner_color = rgba(18, 19, 26, 0.72)
    font_color = rgba(237, 237, 237, 0.94)
    fade_on_empty = false
    placeholder_text = <span foreground="##ededed99">$USER</span>
    check_color = rgba(77, 163, 255, 0.72)
    fail_color = rgba(255, 89, 118, 0.72)
    rounding = 24
    position = 0, -90
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(237, 237, 237, 0.96)
    font_size = 48
    font_family = SF Pro Display
    position = 0, 72
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(237, 237, 237, 0.78)
    font_size = 16
    font_family = SF Pro Rounded
    position = 0, 34
    halign = center
    valign = center
}
